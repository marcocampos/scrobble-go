name: Feature Request
description: Suggest a new feature or improvement for scrobble-go
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation that motivates this request.
      placeholder: "e.g. There is no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you considered, and why this one is preferred.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Code examples, links, screenshots, or anything else relevant.
    validations:
      required: false
