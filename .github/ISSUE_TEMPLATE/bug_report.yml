name: Bug Report
description: Report a bug or unexpected behaviour in scrobble-go
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the unexpected behaviour.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behaviour.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or steps that reproduce the issue.
      render: go
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: "e.g. go1.26.1"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: scrobble-go version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Linux, macOS, Windows"
    validations:
      required: false
